name: release

# Fires only when a version tag is pushed (git tag vX.Y.Z && git push origin
# vX.Y.Z) — never on ordinary commits. Builds both platforms, runs the
# selftest, and publishes a GitHub Release with the zips attached.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          # Same pins as build.yml: 6.8 is the proven-green Windows combo
          version: '6.8.*'
          modules: 'qtmultimedia'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Selftest
        shell: pwsh
        run: |
          $exe = (Get-ChildItem -Recurse build -Filter ProdMeshRemoteRTA.exe | Select-Object -First 1).FullName
          $p = Start-Process -FilePath $exe -ArgumentList "--selftest" -RedirectStandardOutput selftest.txt -Wait -PassThru -NoNewWindow
          Get-Content selftest.txt
          exit $p.ExitCode

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist\ProdMeshRemoteRTA | Out-Null
          $exe = (Get-ChildItem -Recurse build -Filter ProdMeshRemoteRTA.exe | Select-Object -First 1).FullName
          Copy-Item $exe dist\ProdMeshRemoteRTA\
          windeployqt --release dist\ProdMeshRemoteRTA\ProdMeshRemoteRTA.exe
          Compress-Archive -Path dist\ProdMeshRemoteRTA -DestinationPath "ProdMeshRemoteRTA-$env:GITHUB_REF_NAME-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ProdMeshRemoteRTA-*-windows-x64.zip

  macos:
    runs-on: macos-latest
    outputs:
      notarized: ${{ steps.pkg.outputs.notarized }}
    env:
      # True once the signing secrets are configured in the repo. Absent
      # (e.g. on forks) the job falls back to ad-hoc signing, same as CI.
      HAVE_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches CMake version
        run: |
          V="${GITHUB_REF_NAME#v}"; V="${V%%-*}"
          grep -q "VERSION $V " CMakeLists.txt || {
            echo "::error::Tag $GITHUB_REF_NAME does not match the VERSION in CMakeLists.txt — bump it in the release commit."
            exit 1
          }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.*'
          modules: 'qtmultimedia'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build

      - name: Selftest
        run: ./build/ProdMeshRemoteRTA.app/Contents/MacOS/ProdMeshRemoteRTA --selftest

      - name: Import Developer ID certificate
        if: env.HAVE_SIGNING == 'true'
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
        run: |
          # Throwaway keychain on an ephemeral runner; deleted in the cleanup
          # step below. The cert exists on disk only for the import call.
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW=$(uuidgen)
          echo "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 1800 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          # Allow codesign to use the key without a UI prompt (headless CI)
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Package (macdeployqt + sign + notarize)
        id: pkg
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          APP=build/ProdMeshRemoteRTA.app
          macdeployqt "$APP"
          # macdeployqt rewrites load paths and invalidates the signatures;
          # unsigned bundles are SIGKILLed on Apple Silicon, so a re-sign is
          # mandatory either way.
          if [ "$HAVE_SIGNING" = "true" ]; then
            IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN" \
              | awk -F'"' '/Developer ID Application/{print $2; exit}')
            echo "Signing as: $IDENT"
            codesign --force --deep --options runtime --timestamp \
              --entitlements macos/entitlements.plist \
              --sign "$IDENT" "$APP"
            codesign --verify --strict --verbose=2 "$APP"

            ditto -c -k --keepParent "$APP" notarize.zip
            echo "$API_KEY_P8" > "$RUNNER_TEMP/asc-key.p8"
            OUT=$(xcrun notarytool submit notarize.zip \
              --key "$RUNNER_TEMP/asc-key.p8" --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" --wait --timeout 30m) || true
            echo "$OUT"
            if ! echo "$OUT" | grep -q "status: Accepted"; then
              SUB_ID=$(echo "$OUT" | awk '/id:/{print $2; exit}')
              [ -n "$SUB_ID" ] && xcrun notarytool log "$SUB_ID" \
                --key "$RUNNER_TEMP/asc-key.p8" --key-id "$API_KEY_ID" \
                --issuer "$API_ISSUER_ID" || true
              echo "::error::Notarization was not accepted — see log above."
              exit 1
            fi
            # Staple the ticket so Gatekeeper passes offline too
            xcrun stapler staple "$APP"
            echo "notarized=true" >> "$GITHUB_OUTPUT"
          else
            codesign --force --deep --sign - "$APP"
            echo "notarized=false" >> "$GITHUB_OUTPUT"
          fi
          ditto -c -k --keepParent "$APP" "ProdMeshRemoteRTA-$GITHUB_REF_NAME-macos.zip"

      - name: Delete signing keychain
        if: always() && env.KEYCHAIN != ''
        run: security delete-keychain "$KEYCHAIN"

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ProdMeshRemoteRTA-*-macos.zip

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Write install notes
        run: |
          if [ "${{ needs.macos.outputs.notarized }}" = "true" ]; then
            cat > notes.md <<'EOF'
          ## Install notes

          **macOS** — unzip and drag to Applications. The app is signed and
          notarized by Apple, so it opens like any other app. First launch
          asks for microphone access.

          **Windows** — unzip anywhere and run `ProdMeshRemoteRTA.exe`.
          If SmartScreen appears: **More info → Run anyway** (unsigned
          free software — the source is right here in this repo).
          EOF
          else
            cat > notes.md <<'EOF'
          ## Install notes

          **macOS** — unzip and drag to Applications. The build is not
          notarized, so on first launch macOS will object: right-click the
          app → **Open** (older macOS), or go to **System Settings →
          Privacy & Security → Open Anyway** (Sequoia and later). You only
          have to do this once. First launch asks for microphone access.

          **Windows** — unzip anywhere and run `ProdMeshRemoteRTA.exe`.
          If SmartScreen appears: **More info → Run anyway** (unsigned
          free software — the source is right here in this repo).
          EOF
          fi

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: notes.md
          files: |
            ProdMeshRemoteRTA-*-windows-x64.zip
            ProdMeshRemoteRTA-*-macos.zip
